<html xmlns:th="https://www.thymeleaf.org">
<body>

    <div th:if="${message}">
        <h2 th:text="${message}"/>
    </div>

    <div>
        <form method="POST" enctype="multipart/form-data" action="/v1/upload">
            <table>
                <tr>
                    <td>Incident Brief to upload:</td>
                    <td><input type="file" name="file"/></td>
                </tr>
                <tr>
                    <td></td>
                    <td><input type="submit" value="Upload"/></td>
                </tr>
            </table>
        </form>
    </div>

    <div>
        <ul>
            <li th:each="incidentBrief : ${incidentBriefs}">
                <a href="" th:text="${incidentBrief}"/>
            </li>
        </ul>
    </div>

</body>
</html>
